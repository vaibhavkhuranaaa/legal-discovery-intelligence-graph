name: Refresh portfolio manifest
on: {push: {branches: [main], paths: [portfolio/project.json]}}
jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - env: {TOKEN: ${{ secrets.PORTFOLIO_DISPATCH_TOKEN }}}
        run: curl --fail --request POST --url https://api.github.com/repos/vaibhavkhuranaaa/ai-data-portfolio/dispatches --header "Accept: application/vnd.github+json" --header "Authorization: Bearer $TOKEN" --data '{"event_type":"project-manifest-updated"}'
