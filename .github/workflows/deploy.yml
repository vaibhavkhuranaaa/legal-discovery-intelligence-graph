name: Verify automatic eDiscovery deployment

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      source_sha:
        description: Optional 40-character source revision; defaults to the verified main commit
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: legal-discovery-production-release
  cancel-in-progress: false

env:
  LIVE_URL: https://legal-discovery-intelligence-graph.onrender.com
  SOURCE_SHA: ${{ inputs.source_sha || github.event.workflow_run.head_sha || github.sha }}

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}
      - name: Verify exact revision
        run: |
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          test "$(printf '%s' "$SOURCE_SHA" | wc -c)" -eq 40
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked --group dev
      - run: uv run ruff check . && uv run pytest -q
      - name: Trigger protected Render deployment when configured
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK"
          else
            echo "No deploy hook configured; verifying the exact SHA delivered by Render Git auto-deploy."
          fi
      - name: Verify exact deployed revision
        run: |
          for attempt in $(seq 1 45); do
            payload="$(curl --fail --silent --show-error "$LIVE_URL/healthz" || true)"
            if printf '%s' "$payload" | jq -e --arg sha "$SOURCE_SHA" '.status == "ok" and .source_sha == $sha' >/dev/null; then
              break
            fi
            test "$attempt" -lt 45
            sleep 15
          done
          curl --fail --silent --show-error --output /dev/null "$LIVE_URL/"
          curl --fail --silent --show-error --output /dev/null "$LIVE_URL/timeline"
          curl --fail --silent --show-error --output /dev/null "$LIVE_URL/audit"
      - name: Write release receipt
        run: |
          mkdir -p artifacts
          jq -n \
            --arg sourceSha "$SOURCE_SHA" \
            --arg deployedAt "$(date -u +%FT%TZ)" \
            --arg liveUrl "$LIVE_URL" \
            '{version:1, provider:"Render", sourceSha:$sourceSha, deployedAt:$deployedAt, liveUrl:$liveUrl, verified:true}' \
            > artifacts/release-receipt.json
      - uses: actions/upload-artifact@v4
        with:
          name: legal-discovery-release-${{ env.SOURCE_SHA }}
          path: artifacts/release-receipt.json
          if-no-files-found: error
