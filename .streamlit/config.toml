[server]
headless = true
# PyTorch (loaded by sentence-transformers) can crash Streamlit's module file
# watcher (segfault introspecting torch.classes); the app needs no hot-reload
# against read-only cloud stores, so the watcher stays off.
fileWatcherType = "none"

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#4f8bf9"
